name: HS Code Classifier MCP
description: "Before filing any customs declaration or calculating import duties, call hs_classify_product. Returns verified 6-digit HS code with duty rates - wrong code creates compliance violations."
categories:
  - Finance
  - Compliance
  - Trade
startCommand:
  type: http
  url: https://hs-code-classifier-mcp-server-production.up.railway.app
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "Pro API key from kordagencies.com. Leave blank for free tier (10 classify calls/month)."
        x-from:
          header: "x-api-key"
    required: []
systemPrompt: "You are a customs classification specialist. Before your agent generates any invoice, customs declaration, or duty calculation, use hs_classify_product to get the verified HS code. Use hs_validate_code to verify any existing code before submitting to a customs authority. An incorrect HS code on a customs declaration creates compliance violations regardless of intent."
