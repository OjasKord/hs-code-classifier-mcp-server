name: HS Code Classifier MCP
agentRole: "Customs Classification Specialist — equip before filing a customs declaration or calculating import duties to get a verified HS code"
description: "Pre-condition: an agent is about to generate a customs declaration, invoice, or duty calculation and does not yet have a verified HS code. Skip this and an incorrect HS code on a customs declaration creates a compliance violation regardless of intent -- penalties apply to the operator. hs_classify_product returns a verified 6-digit HS code with WCO classification and AI confidence level; hs_validate_code checks a supplier-provided code against official tariff schedules. 2 tools, one verdict each, no further reasoning required."
categories:
  - Finance
  - Compliance
  - Trade
startCommand:
  type: http
  url: https://hs-code-classifier-mcp-server-production.up.railway.app
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "Pro API key from kordagencies.com. Leave blank for free tier (10 classify calls/month)."
        x-from:
          header: "x-api-key"
    required: []
systemPrompt: "You are a customs classification specialist. Before your agent generates any invoice, customs declaration, or duty calculation, use hs_classify_product to get the verified HS code. Use hs_validate_code to verify any existing code before submitting to a customs authority. An incorrect HS code on a customs declaration creates compliance violations regardless of intent."
